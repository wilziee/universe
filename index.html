<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>XAERISOFT UNIVERSE ZOOM</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <!-- Canvas 3D -->
    <canvas id="universe-canvas"></canvas>

    <!-- UI Overlay -->
    <div id="ui-container">
        <header class="glass-panel top-bar">
            <h1>🌌 XAERISOFT <span>UNIVERSE</span></h1>
            <div class="search-box">
                <input type="text" id="search-input" placeholder="Search objects (e.g., Andromeda)...">
            </div>
            <div class="tools">
                <button id="btn-home">🏠 Home</button>
                <button id="btn-minimap">🗺 Mini Map</button>
                <button id="btn-fullscreen">⛶ Fullscreen</button>
            </div>
        </header>

        <!-- Earth Layer Controls (muncul khusus saat fokus di Bumi) -->
        <div id="earth-layers" class="glass-panel" style="position: absolute; left: 20px; top: 100px; display: none;">
            <h3>🌍 Earth Layers</h3>
            <button id="btn-mode-0">🛰 Satellite (Blue Marble)</button>
            <button id="btn-mode-1">🌍 Political Boundaries</button>
            <button id="btn-mode-2">🗺 Topographic (Terrain)</button>
            <button id="btn-mode-3">🌃 Night Lights (Suomi NPP)</button>
            <button id="btn-mode-4">☁ Weather (Live Data)</button>
        </div>

        <!-- Info Panel (muncul saat objek diklik) -->
        <aside class="glass-panel info-panel" id="info-panel" style="display: none;">
            <h2 id="obj-name">Earth</h2>
            <div id="data-source-badge" class="source-badge">Data: NASA / USGS</div>
            <div id="artist-badge" class="artist-badge" style="display:none;">⚠️ ARTIST'S IMPRESSION</div>
            
            <p id="obj-type" class="neon-text">Planet</p>
            <div class="data-grid">
                <div><span>Radius:</span> <span id="data-radius">6,371 km</span></div>
                <div><span>Gravity:</span> <span id="data-gravity">9.8 m/s²</span></div>
            </div>
            
            <div class="travel-calculator">
                <h3>Travel Time (from Earth)</h3>
                <ul>
                    <li>🚀 Rocket: <span id="travel-rocket">0</span></li>
                    <li>💡 Light: <span id="travel-light">0</span></li>
                </ul>
            </div>
        </aside>

        <!-- Time Travel Slider -->
        <footer class="glass-panel time-travel">
            <label>TIME TRAVEL: <span id="time-display">NOW</span></label>
            <input type="range" id="time-slider" min="-1000000" max="1000000" value="0">
        </footer>
    </div>

    <!-- Import Map untuk Three.js ES Modules -->
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>
    <script type="module" src="script.js"></script>
</body>
</html>
